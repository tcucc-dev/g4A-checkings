<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到報表 — TCU WebInsight</title>
  <meta name="description" content="慈濟大學系所管理報表中心 — 找不到該路徑">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a1929 0%, #1a2332 50%, #0a1929 100%);
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .container { max-width: 580px; }
    .code {
      display: inline-block;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #66c5ff 0%, #4ee0c1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .path {
      font-family: Consolas, monospace;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-block;
      color: #cbd5e1;
      font-size: 13px;
      margin-bottom: 28px;
      word-break: break-all;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.18s ease;
    }
    a.primary {
      background: linear-gradient(135deg, #66c5ff 0%, #4ee0c1 100%);
      color: #0a1929;
    }
    a.primary:hover { transform: translateY(-2px); }
    a.secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #e8eaf0;
    }
    a.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(102, 197, 255, 0.4);
    }
    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>找不到這個報表</h1>
    <p>你輸入的網址不在慈濟大學管理報表中心內。可能是系所尚未部署，或路徑輸入錯誤。</p>
    <div class="path" id="path">/</div>
    <div class="actions">
      <a class="primary" href="./">回到報表中心首頁</a>
      <a class="secondary" href="./itm/">ITM 報表</a>
      <a class="secondary" href="./nc/">NC 報表</a>
    </div>
    <div class="footer">慈濟大學各系所管理報表中心</div>
  </div>
  <script>
    // Display the path user tried to access
    var p = window.location.pathname || '/';
    document.getElementById('path').textContent = p;
  </script>
</body>
</html>
